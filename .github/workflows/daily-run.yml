name: Daily paper trading run

on:
  schedule:
    # 21:30 UTC, Mon-Fri = 4:30pm ET (winter) / 5:30pm ET (summer) — after the US market's 4pm close either way
    - cron: '30 21 * * 1-5'
  workflow_dispatch: {}   # lets you click "Run workflow" in the Actions tab to trigger it manually

permissions:
  contents: write   # needed to commit the updated data files back to this repo

jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the trading engine
        run: python phase3_paper_trader.py run

      - name: Commit and push updated data
        run: |
          git config user.name "phase3-bot"
          git config user.email "actions@users.noreply.github.com"
          git add paper_state.json dashboard_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit (already ran today, or the market was closed)."
          else
            git commit -m "Daily paper trading update $(date -u +%F)"
            git push
          fi
